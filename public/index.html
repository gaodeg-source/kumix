<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 32px 24px; }
    a { color: inherit; text-decoration: none; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; margin-bottom: 24px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #16a34a; }
    .dot.error  { background: #dc2626; }
    .next-refresh { font-size: 12px; color: #aaa; margin-left: auto; }
    .section-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 18px 20px; display: block; transition: border-color 0.2s, box-shadow 0.2s; }
    .card:not(.tba):hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card.tba { opacity: 0.4; cursor: default; pointer-events: none; }
    .card.changed { border-color: #16a34a; }
    .item-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .arrow { font-size: 14px; color: #ccc; }
    .sales-row { display: flex; align-items: baseline; gap: 8px; }
    .sales-count { font-size: 32px; font-weight: 800; color: #111; line-height: 1; }
    .sales-label { font-size: 12px; color: #aaa; }
    .tba-val { font-size: 20px; font-weight: 800; color: #ccc; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Sales Tracker</h1>
  <p class="subtitle">Weidian · Polls every 15s</p>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
    <span class="next-refresh" id="next-refresh"></span>
  </div>

  <div class="section-label">All Items</div>
  <div class="grid" id="grid"></div>

  <script>
    const ITEM_CONFIG = {
      '7565709739': {
        label: 'Day1 宽幅拍立得',
        stocks: { 'KUNHO': 699699, 'YOUMIN': 985477, 'XAYDEN': 987130, 'MINJE': 875395, 'MASAMI': 987500, 'HYUNBIN': 998533, 'ON:N': 987423 }
      },
      '7565710019': {
        label: 'Day1卡套装饰会',
        stocks: { 'KUNHO': 984766, 'YOUMIN': 980640, 'XAYDEN': 966266, 'MINJE': 669733, 'MASAMI': 669772, 'HYUNBIN': 965555, 'ON:N': 666566 }
      },
      '7526988904': {
        label: 'Day1视频拍摄会',
        stocks: { 'KUNHO': 999688, 'YOUMIN': 999833, 'XAYDEN': 999510, 'MINJE': 999805, 'MASAMI': 999910, 'HYUNBIN': 999694, 'ON:N': 999877 }
      },
      '7719424307': {
        label: 'Day1小分队拍立得',
        members: ['RAP LINE', 'VOCAL LINE'],
        stocks: { 'RAP LINE': 488444, 'VOCAL LINE': 548985 }
      },
      '7527002904': {
        label: 'Day1赶鸡游戏',
        stocks: { 'KUNHO': 999590, 'YOUMIN': 999805, 'XAYDEN': 999696, 'MINJE': 999780, 'MASAMI': 999866, 'HYUNBIN': 999755, 'ON:N': 999866 }
      },
      '7525118051': {
        label: 'Day1美高主题',
        type: 'single',
        maxStock: 94685930
      },
      '7527002684': {
        label: 'Day2一日饭经',
        stocks: { 'KUNHO': 999588, 'YOUMIN': 999810, 'XAYDEN': 999444, 'MINJE': 999303, 'MASAMI': 999899, 'HYUNBIN': 999348, 'ON:N': 999828 }
      },
      '7527004128': {
        label: 'Day2宽幅拍立得',
        stocks: { 'KUNHO': 998188, 'YOUMIN': 999777, 'XAYDEN': 998999, 'MINJE': 999515, 'MASAMI': 999899, 'HYUNBIN': 999494, 'ON:N': 999870 }
      },
      '7525161891': {
        label: 'Day2手机壳装饰',
        stocks: { 'KUNHO': 999388, 'YOUMIN': 999766, 'XAYDEN': 999667, 'MINJE': 999696, 'MASAMI': 999915, 'HYUNBIN': 999700, 'ON:N': 999828 }
      },
      '7722424286': {
        label: 'Day2视频拍摄会',
        stocks: { 'KUNHO': 869574, 'YOUMIN': 869574, 'XAYDEN': 869574, 'MINJE': 869574, 'MASAMI': 869574, 'HYUNBIN': 869574, 'ON:N': 869574 }
      }
    };
    // slots 2-13 filled in as links are added
    const ITEM_SLOTS = [
      '7565709739',
      '7565710019',
      '7526988904',
      '7719424307',
      '7527002904',
      '7525118051',
      '7527002684',
      '7527004128',
      '7525161891',
      '7722424286',
      null, null, null
    ];
    const INTERVAL = 15000;
    let prevTotals = {}, countdownTimer;

    function fmt(n) { return n.toLocaleString(); }
    function now() { return new Date().toLocaleTimeString('en-US', { hour12: false }); }
    function canonicalTitle(t) { return t.replace(/：/g, ':'); }

    function buildGrid() {
      const grid = document.getElementById('grid');
      ITEM_SLOTS.forEach((id, i) => {
        const num = String(i + 1).padStart(2, '0');
        const el = document.createElement(id ? 'a' : 'div');
        el.className = 'card' + (id ? '' : ' tba');
        el.id = 'card-' + i;
        if (id) el.href = '/item/' + id;
        const cfg = id ? ITEM_CONFIG[id] : null;
        const label = cfg ? cfg.label : 'Item ' + num;
        el.innerHTML = id
          ? `<div class="item-label">${label}<span class="arrow">→</span></div>
             <div class="sales-row">
               <div class="sales-count" id="total-${id}">—</div>
               <div class="sales-label">sold</div>
             </div>`
          : `<div class="item-label">${label}</div>
             <div class="tba-val">—</div>`;
        grid.appendChild(el);
      });
    }

    async function fetchAll() {
      const activeIds = ITEM_SLOTS.filter(Boolean);
      let hasError = false;
      await Promise.all(activeIds.map(async (id) => {
        try {
          const data = await fetch('/api/stockItem?itemId=' + id).then(r => r.json());
          if (data.status.code !== 0) return;
          const cfg = ITEM_CONFIG[id];
          let total = 0;
          if (cfg.type === 'single') {
            total = cfg.maxStock - data.result.itemStock;
          } else {
            data.result.skuInfos.forEach(sku => {
              const info = sku.skuInfo;
              const max = cfg.stocks[canonicalTitle(info.title)];
              if (max !== undefined) total += max - info.stock;
            });
          }
          const el = document.getElementById('total-' + id);
          if (el) {
            const prev = prevTotals[id];
            el.textContent = fmt(total);
            if (prev !== undefined && total !== prev) {
              const card = document.getElementById('card-' + ITEM_SLOTS.indexOf(id));
              if (card) { card.classList.add('changed'); setTimeout(() => card.classList.remove('changed'), 5000); }
            }
            prevTotals[id] = total;
          }
        } catch (e) { hasError = true; }
      }));
      setStatus(!hasError, hasError ? 'Error fetching data' : 'Live · ' + now());
      startCountdown();
    }

    function setStatus(ok, text) {
      document.getElementById('dot').className = 'dot ' + (ok ? 'active' : 'error');
      document.getElementById('status-text').textContent = text;
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let c = INTERVAL / 1000;
      const el = document.getElementById('next-refresh');
      el.textContent = 'Next refresh in ' + c + 's';
      countdownTimer = setInterval(() => {
        c--;
        el.textContent = c > 0 ? 'Next refresh in ' + c + 's' : 'Refreshing...';
        if (c <= 0) clearInterval(countdownTimer);
      }, 1000);
    }

    buildGrid();
    fetchAll();
    setInterval(fetchAll, INTERVAL);
  </script>
</body>
</html>
