<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 32px 24px; }
    a { color: inherit; text-decoration: none; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; margin-bottom: 24px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #16a34a; }
    .dot.error  { background: #dc2626; }
    .next-refresh { font-size: 12px; color: #aaa; margin-left: auto; }
    .total-bar { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .total-label { font-size: 13px; color: #888; }
    .total-value { font-size: 24px; font-weight: 800; }
    .section-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; margin-top: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 18px 20px; display: block; transition: border-color 0.2s, box-shadow 0.2s; }
    .card:hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card.changed { border-color: #16a34a; }
    .member-name { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .sales-row { display: flex; align-items: baseline; gap: 8px; }
    .sales-count { font-size: 32px; font-weight: 800; color: #111; line-height: 1; }
    .sales-label { font-size: 12px; color: #aaa; }
    .delta-badge { display: inline-block; font-size: 12px; font-weight: 700; border-radius: 5px; padding: 1px 7px; margin-top: 8px; opacity: 0; transition: opacity 0.3s; }
    .delta-badge.up   { color: #16a34a; background: #dcfce7; }
    .delta-badge.down { color: #dc2626; background: #fee2e2; }
    .delta-badge.visible { opacity: 1; }
    .item2-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; transition: border-color 0.2s; }
    .item2-card:hover { border-color: #aaa; }
    .item2-name { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .item2-sold { font-size: 26px; font-weight: 800; }
    .item2-label { font-size: 12px; color: #aaa; }
    .arrow { font-size: 18px; color: #ccc; }
  </style>
</head>
<body>
  <h1>Sales Tracker</h1>
  <p class="subtitle">Weidian · Polls every 15s</p>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
    <span class="next-refresh" id="next-refresh"></span>
  </div>

  <div class="section-label">1v7 Special Video Call</div>
  <a class="item2-card" href="/1v7" id="item2-card">
    <div>
      <div class="item2-name">1v7 Special Video Call</div>
      <div class="sales-row">
        <div class="item2-sold" id="item2-sold">—</div>
        <div class="item2-label">sold</div>
      </div>
    </div>
    <div class="arrow">→</div>
  </a>

  <div class="section-label">1v1 Video Call — by Member</div>
  <div class="total-bar">
    <div>
      <div class="total-label">Total (all members)</div>
      <div class="total-value" id="total-sales">—</div>
    </div>
  </div>
  <div class="grid" id="grid"></div>

  <script>
    const MAX_STOCK = 888686;
    const MEMBERS = ['KUNHO','YOUMIN','XAYDEN','MINJE','MASAMI','HYUNBIN','ON:N'];
    const ITEM2_MAX = 999999300;
    const INTERVAL = 15000;
    let prevSales = {}, prevItem2 = null, countdownTimer;

    function fmt(n) { return n.toLocaleString(); }
    function now() { return new Date().toLocaleTimeString('en-US', { hour12: false }); }

    function buildGrid() {
      const grid = document.getElementById('grid');
      if (grid.children.length) return;
      MEMBERS.forEach(m => {
        const card = document.createElement('a');
        card.className = 'card';
        card.id = 'card-' + m;
        card.href = '/member/' + encodeURIComponent(m);
        card.innerHTML = `
          <div class="member-name">${m}</div>
          <div class="sales-row">
            <div class="sales-count" id="sales-${m}">—</div>
            <div class="sales-label">sold</div>
          </div>
          <div class="delta-badge" id="badge-${m}"></div>`;
        grid.appendChild(card);
      });
    }

    function update1(data) {
      buildGrid();
      let total = 0;
      data.result.skuInfos.forEach(sku => {
        const info = sku.skuInfo;
        const sales = MAX_STOCK - info.stock;
        total += sales;
        document.getElementById('sales-' + info.title).textContent = fmt(sales);
        const prev = prevSales[info.title];
        if (prev !== undefined && sales !== prev) {
          const delta = sales - prev;
          const badge = document.getElementById('badge-' + info.title);
          const card  = document.getElementById('card-'  + info.title);
          badge.textContent = (delta > 0 ? '+' : '') + fmt(delta);
          badge.className = 'delta-badge visible ' + (delta > 0 ? 'up' : 'down');
          card.classList.add('changed');
          setTimeout(() => { badge.classList.remove('visible'); card.classList.remove('changed'); }, 5000);
        }
        prevSales[info.title] = sales;
      });
      document.getElementById('total-sales').textContent = fmt(total);
    }

    function update2(data) {
      const sales = ITEM2_MAX - data.result.itemStock;
      const prev = prevItem2;
      document.getElementById('item2-sold').textContent = fmt(sales);
      if (prev !== null && sales !== prev) {
        const delta = sales - prev;
        const card = document.getElementById('item2-card');
        card.classList.add('changed');
        setTimeout(() => card.classList.remove('changed'), 5000);
      }
      prevItem2 = sales;
    }

    function setStatus(ok, text) {
      document.getElementById('dot').className = 'dot ' + (ok ? 'active' : 'error');
      document.getElementById('status-text').textContent = text;
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let c = INTERVAL / 1000;
      const el = document.getElementById('next-refresh');
      el.textContent = 'Next refresh in ' + c + 's';
      countdownTimer = setInterval(() => {
        c--;
        el.textContent = c > 0 ? 'Next refresh in ' + c + 's' : 'Refreshing...';
        if (c <= 0) clearInterval(countdownTimer);
      }, 1000);
    }

    async function fetchAll() {
      try {
        const [d1, d2] = await Promise.all([
          fetch('/api/stock').then(r => r.json()),
          fetch('/api/stock2').then(r => r.json()),
        ]);
        if (d1.status.code === 0) update1(d1);
        if (d2.status.code === 0) update2(d2);
        setStatus(true, 'Live · ' + now());
      } catch(e) { setStatus(false, 'Error: ' + e.message); }
      startCountdown();
    }

    fetchAll();
    setInterval(fetchAll, INTERVAL);
  </script>
</body>
</html>
