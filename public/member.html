<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member — sold_log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 32px 24px; }
    a { color: inherit; text-decoration: none; }
    .back { font-size: 13px; color: #888; display: inline-block; margin-bottom: 20px; transition: color 0.2s; }
    .back:hover { color: #333; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .meta { font-size: 13px; color: #888; margin-bottom: 16px; }
    .warning { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #92400e; margin-bottom: 20px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; margin-bottom: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #16a34a; }
    .dot.error  { background: #dc2626; }
    .next-refresh { font-size: 12px; color: #aaa; margin-left: auto; }
    .summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px 18px; min-width: 140px; }
    .summary-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .summary-value { font-size: 26px; font-weight: 800; color: #111; }
    .summary-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    caption { text-align: left; font-size: 15px; font-weight: 700; padding: 14px 16px 10px; background: #fff; border: 1px solid #e0e0e0; border-bottom: none; border-radius: 10px 10px 0 0; }
    th { text-align: left; font-size: 13px; font-weight: 700; padding: 10px 16px; background: #fff; border-bottom: 2px solid #e0e0e0; color: #111; }
    th:last-child, td:last-child { text-align: right; }
    td { padding: 9px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #f0f0f0; color: #111; }
    tr:last-child td { border-bottom: none; }
    td.ts { font-variant-numeric: tabular-nums; color: #333; }
    td.sold-val { font-variant-numeric: tabular-nums; }
    td.delta { font-variant-numeric: tabular-nums; text-align: right; }
    td.delta.up   { color: #16a34a; }
    td.delta.down { color: #dc2626; }
    td.delta.zero { color: #aaa; }
  </style>
</head>
<body>
  <a class="back" id="back-link" href="/">← Back</a>
  <h1 id="page-title">—</h1>
  <p class="meta" id="page-meta"></p>

  <div class="warning">
    <span>⚠</span>
    <span>Total stock value is estimated from observed current stock and may not reflect actual initial inventory. Sales counts may be inaccurate.</span>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
    <span class="next-refresh" id="next-refresh"></span>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="summary-label">Total Sold</div>
      <div class="summary-value" id="sum-sold">—</div>
      <div class="summary-sub">cumulative</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Last Change</div>
      <div class="summary-value" id="sum-delta">—</div>
      <div class="summary-sub" id="sum-delta-time">&nbsp;</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Stock Left</div>
      <div class="summary-value" id="sum-stock">—</div>
      <div class="summary-sub" id="sum-stock-sub">of ~—</div>
    </div>
  </div>

  <table>
    <caption id="table-caption">sold_log</caption>
    <thead><tr><th>timestamp</th><th>sold</th><th>change</th></tr></thead>
    <tbody id="log-body"></tbody>
  </table>

  <script>
    const ITEM_CONFIG = {
      '7565709739': {
        label: 'Day1 宽幅拍立得',
        stocks: { 'KUNHO': 699699, 'YOUMIN': 985477, 'XAYDEN': 987130, 'MINJE': 875395, 'MASAMI': 987500, 'HYUNBIN': 998533, 'ON:N': 987423 }
      },
      '7565710019': {
        label: 'Day1卡套装饰会',
        stocks: { 'KUNHO': 984766, 'YOUMIN': 980640, 'XAYDEN': 966266, 'MINJE': 669733, 'MASAMI': 669772, 'HYUNBIN': 965555, 'ON:N': 666566 }
      },
      '7526988904': {
        label: 'Day1视频拍摄会',
        stocks: { 'KUNHO': 999688, 'YOUMIN': 999833, 'XAYDEN': 999510, 'MINJE': 999805, 'MASAMI': 999910, 'HYUNBIN': 999694, 'ON:N': 999877 }
      },
      '7719424307': {
        label: 'Day1小分队拍立得',
        members: ['RAP LINE', 'VOCAL LINE'],
        stocks: { 'RAP LINE': 488444, 'VOCAL LINE': 548985 }
      },
      '7527002904': {
        label: 'Day1赶鸡游戏',
        stocks: { 'KUNHO': 999590, 'YOUMIN': 999805, 'XAYDEN': 999696, 'MINJE': 999780, 'MASAMI': 999866, 'HYUNBIN': 999755, 'ON:N': 999866 }
      },
      '7525118051': {
        label: 'Day1美高主题',
        type: 'single',
        maxStock: 94685930
      },
      '7527002684': {
        label: 'Day2一日饭经',
        stocks: { 'KUNHO': 999588, 'YOUMIN': 999810, 'XAYDEN': 999444, 'MINJE': 999303, 'MASAMI': 999899, 'HYUNBIN': 999348, 'ON:N': 999828 }
      },
      '7527004128': {
        label: 'Day2宽幅拍立得',
        stocks: { 'KUNHO': 998188, 'YOUMIN': 999777, 'XAYDEN': 998999, 'MINJE': 999515, 'MASAMI': 999899, 'HYUNBIN': 999494, 'ON:N': 999870 }
      },
      '7525161891': {
        label: 'Day2手机壳装饰',
        stocks: { 'KUNHO': 999388, 'YOUMIN': 999766, 'XAYDEN': 999667, 'MINJE': 999696, 'MASAMI': 999915, 'HYUNBIN': 999700, 'ON:N': 999828 }
      },
      '7722424286': {
        label: 'Day2视频拍摄会',
        stocks: { 'KUNHO': 869574, 'YOUMIN': 869574, 'XAYDEN': 869574, 'MINJE': 869574, 'MASAMI': 869574, 'HYUNBIN': 869574, 'ON:N': 869574 }
      },
      '7525003573': {
        label: 'Day2套圈小游戏',
        stocks: { 'KUNHO': 99735, 'YOUMIN': 999850, 'XAYDEN': 999255, 'MINJE': 999530, 'MASAMI': 999205, 'HYUNBIN': 999800, 'ON:N': 999905 }
      },
      '7524652103': {
        label: 'Day2假想职业',
        type: 'single',
        maxStock: 999957270
      }
    };
    const DEFAULT_MEMBERS = ['KUNHO', 'YOUMIN', 'XAYDEN', 'MINJE', 'MASAMI', 'HYUNBIN', 'ON:N'];
    const INTERVAL = 15000;

    const parts = window.location.pathname.split('/'); // ['', 'item', itemId, member]
    const ITEM_ID = parts[2];
    const MEMBER  = decodeURIComponent(parts[3] || '');
    const cfg = ITEM_CONFIG[ITEM_ID];
    const MEMBERS = cfg ? (cfg.members || DEFAULT_MEMBERS) : DEFAULT_MEMBERS;
    const MAX_STOCK = cfg && cfg.stocks[MEMBER];
    const HISTORY_KEY = ITEM_ID + ':' + MEMBER;

    if (!cfg || !MEMBERS.includes(MEMBER)) {
      document.body.innerHTML = '<p style="padding:32px;color:#888">Not found. <a href="/">← Back</a></p>';
    } else {
      document.title = MEMBER + '-sold_log · ' + cfg.label;
      document.getElementById('page-title').textContent = MEMBER + '-sold_log';
      document.getElementById('page-meta').textContent = cfg.label + ' · Item #' + ITEM_ID + ' · Base stock: ~' + MAX_STOCK.toLocaleString() + ' (estimated)';
      document.getElementById('back-link').href = '/item/' + ITEM_ID;
      document.getElementById('back-link').textContent = '← ' + cfg.label;
      document.getElementById('table-caption').textContent = MEMBER + '-sold_log';
      document.getElementById('sum-stock-sub').textContent = 'of ~' + MAX_STOCK.toLocaleString();
    }

    let prevSales = null, countdownTimer;
    function fmt(n) { return n.toLocaleString(); }
    function canonicalTitle(t) { return t.replace(/：/g, ':'); }
    function tsNow() {
      const d = new Date(), pad = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function addRow(ts, sales, delta) {
      const tbody = document.getElementById('log-body');
      const tr = document.createElement('tr');
      let dc = 'delta zero', dt = '—';
      if (delta !== null) {
        if (delta > 0)      { dc = 'delta up';   dt = '+' + fmt(delta); }
        else if (delta < 0) { dc = 'delta down'; dt = fmt(delta); }
      }
      tr.innerHTML = '<td class="ts">' + ts + '</td><td class="sold-val">' + fmt(sales) + '</td><td class="' + dc + '">' + dt + '</td>';
      tbody.prepend(tr);
    }

    async function saveEntry(ts, sold, delta) {
      try {
        await fetch('/api/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: HISTORY_KEY, ts, sold, delta }),
        });
      } catch (e) { /* non-critical */ }
    }

    async function loadHistory() {
      try {
        const entries = await fetch('/api/history?key=' + encodeURIComponent(HISTORY_KEY)).then(r => r.json());
        if (!entries.length) return;
        [...entries].reverse().forEach(e => addRow(e.ts, e.sold, e.delta));
        const latest = entries[0];
        prevSales = latest.sold;
        document.getElementById('sum-sold').textContent = fmt(latest.sold);
        document.getElementById('sum-stock').textContent = fmt(MAX_STOCK - latest.sold);
      } catch (e) { /* no history yet */ }
    }

    function update(data) {
      const sku = data.result.skuInfos.find(s => canonicalTitle(s.skuInfo.title) === MEMBER);
      if (!sku) return;
      const info = sku.skuInfo;
      const sales = MAX_STOCK - info.stock;
      const ts = tsNow();
      const delta = prevSales !== null ? sales - prevSales : null;
      if (delta === null || delta !== 0) {
        addRow(ts, sales, delta);
        saveEntry(ts, sales, delta);
      }
      document.getElementById('sum-sold').textContent = fmt(sales);
      document.getElementById('sum-stock').textContent = fmt(info.stock);
      if (delta !== null && delta !== 0) {
        const el = document.getElementById('sum-delta');
        el.textContent = (delta > 0 ? '+' : '') + fmt(delta);
        el.style.color = delta > 0 ? '#16a34a' : '#dc2626';
        document.getElementById('sum-delta-time').textContent = 'at ' + ts.split(' ')[1];
      } else if (prevSales === null) {
        document.getElementById('sum-delta').textContent = '—';
      }
      prevSales = sales;
    }

    function setStatus(ok, text) {
      document.getElementById('dot').className = 'dot ' + (ok ? 'active' : 'error');
      document.getElementById('status-text').textContent = text;
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let c = INTERVAL / 1000;
      const el = document.getElementById('next-refresh');
      el.textContent = 'Next refresh in ' + c + 's';
      countdownTimer = setInterval(() => {
        c--;
        el.textContent = c > 0 ? 'Next refresh in ' + c + 's' : 'Refreshing...';
        if (c <= 0) clearInterval(countdownTimer);
      }, 1000);
    }

    async function fetchStock() {
      if (!cfg || !MEMBERS.includes(MEMBER)) return;
      try {
        const data = await fetch('/api/stockItem?itemId=' + ITEM_ID).then(r => r.json());
        if (data.status.code !== 0) throw new Error(data.status.message);
        update(data);
        setStatus(true, 'Live · ' + tsNow().split(' ')[1]);
      } catch (e) { setStatus(false, 'Error: ' + e.message); }
      startCountdown();
    }

    loadHistory().then(() => {
      fetchStock();
      setInterval(fetchStock, INTERVAL);
    });
  </script>
</body>
</html>
